version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      test-dependencies:
        patterns:
          - 'Microsoft.NET.Test.Sdk'
          - 'xunit*'
