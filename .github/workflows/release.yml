name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - '.github/releases/v*.md'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.3.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Resolve release metadata
        id: release
        shell: pwsh
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ($env:GITHUB_REF_TYPE -eq 'tag') {
              $tag = $env:GITHUB_REF_NAME
          }
          elseif ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
              $tag = $env:DISPATCH_TAG
          }
          else {
              $before = $env:EVENT_BEFORE
              if ([string]::IsNullOrWhiteSpace($before) -or $before -match '^0+$') {
                  $changedFiles = @(git diff-tree --no-commit-id --name-only -r $env:GITHUB_SHA)
              }
              else {
                  $changedFiles = @(git diff --name-only $before $env:GITHUB_SHA)
              }

              $releaseFiles = @($changedFiles | Where-Object {
                  $_ -match '^\.github/releases/v[^/]+\.md$'
              })

              if ($releaseFiles.Count -ne 1) {
                  throw "Expected exactly one changed release note file, found: $($releaseFiles -join ', ')"
              }

              $tag = [System.IO.Path]::GetFileNameWithoutExtension($releaseFiles[0])
          }

          $tagMatch = [System.Text.RegularExpressions.Regex]::Match(
              $tag,
              '^v(?<version>\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?)$')
          if (-not $tagMatch.Success) {
              throw "Invalid release tag: $tag"
          }

          $version = $tagMatch.Groups['version'].Value
          $notesPath = ".github/releases/$tag.md"
          if (-not (Test-Path -LiteralPath $notesPath -PathType Leaf)) {
              throw "Release notes file was not found: $notesPath"
          }

          [xml]$buildProps = Get-Content -LiteralPath 'Directory.Build.props'
          $repositoryVersion = [string]$buildProps.Project.PropertyGroup.Version
          if ($repositoryVersion -ne $version) {
              throw "Tag version $version does not match Directory.Build.props version $repositoryVersion."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "notes_path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$($version.Contains('-').ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore .\GitKeyRouter.sln
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet restore .\src\GitKeyRouter.App\GitKeyRouter.App.csproj -r win-x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify formatting
        run: dotnet format .\GitKeyRouter.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build .\GitKeyRouter.sln -c Release --no-restore

      - name: Test
        run: dotnet test .\GitKeyRouter.sln -c Release --no-build

      - name: Publish portable build
        shell: pwsh
        run: |
          $publishDir = 'artifacts\publish\win-x64'
          Remove-Item -LiteralPath $publishDir -Recurse -Force -ErrorAction SilentlyContinue
          dotnet publish .\src\GitKeyRouter.App\GitKeyRouter.App.csproj `
            -c Release `
            -r win-x64 `
            --no-restore `
            -p:PublishProfile=win-x64-single-file `
            -p:Version=${{ steps.release.outputs.version }} `
            -o $publishDir
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\scripts\Test-WinX64Publish.ps1 `
            -PublishDir $publishDir `
            -ChecksumFileName 'GitKeyRouter-win-x64.sha256'

      - name: Publish framework-dependent build
        shell: pwsh
        run: |
          $publishDir = 'artifacts\publish\win-x64-framework-dependent'
          Remove-Item -LiteralPath $publishDir -Recurse -Force -ErrorAction SilentlyContinue
          dotnet publish .\src\GitKeyRouter.App\GitKeyRouter.App.csproj `
            -c Release `
            -r win-x64 `
            --no-restore `
            -p:PublishProfile=win-x64-framework-dependent `
            -p:Version=${{ steps.release.outputs.version }} `
            -o $publishDir
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\scripts\Test-WinX64Publish.ps1 `
            -PublishDir $publishDir `
            -ChecksumFileName 'GitKeyRouter-win-x64-framework-dependent.sha256'

      - name: Prepare release assets
        shell: pwsh
        run: .\scripts\Prepare-ReleaseAssets.ps1 -Version '${{ steps.release.outputs.version }}'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: GitKeyRouter-${{ steps.release.outputs.version }}
          path: artifacts/release/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_NOTES: ${{ steps.release.outputs.notes_path }}
          IS_PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          $ErrorActionPreference = 'Stop'
          $assets = @(Get-ChildItem -LiteralPath 'artifacts\release' -File | ForEach-Object { $_.FullName })
          if ($assets.Count -eq 0) {
              throw 'No release assets were generated.'
          }

          gh release view $env:RELEASE_TAG --json tagName 2>$null | Out-Null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
              gh release upload $env:RELEASE_TAG $assets --clobber
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

              $editArguments = @(
                  'release', 'edit', $env:RELEASE_TAG,
                  '--title', "GitKeyRouter $env:RELEASE_VERSION",
                  '--notes-file', $env:RELEASE_NOTES,
                  '--draft=false'
              )
              if ($env:IS_PRERELEASE -eq 'true') {
                  $editArguments += '--prerelease'
              }
              else {
                  $editArguments += @('--prerelease=false', '--latest')
              }

              & gh @editArguments
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              exit 0
          }

          $createArguments = @('release', 'create', $env:RELEASE_TAG) + $assets + @(
              '--title', "GitKeyRouter $env:RELEASE_VERSION",
              '--notes-file', $env:RELEASE_NOTES
          )

          if ($env:GITHUB_REF_TYPE -eq 'tag') {
              $createArguments += '--verify-tag'
          }
          else {
              $createArguments += @('--target', $env:GITHUB_SHA)
          }

          if ($env:IS_PRERELEASE -eq 'true') {
              $createArguments += '--prerelease'
          }
          else {
              $createArguments += '--latest'
          }

          & gh @createArguments
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
