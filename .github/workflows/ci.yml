name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.302

      - name: Restore
        run: dotnet restore .\GitKeyRouter.sln --locked-mode

      - name: Verify formatting
        run: dotnet format .\GitKeyRouter.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build .\GitKeyRouter.sln -c Release --no-restore

      - name: Test
        run: dotnet test .\GitKeyRouter.sln -c Release --no-build --no-restore --logger "trx;LogFileName=tests.trx"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore
